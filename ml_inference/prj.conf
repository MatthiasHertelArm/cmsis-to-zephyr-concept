# Enable C++ (required by ExecuTorch)
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# CMSIS-Pack ML components (from generated Kconfig)
CONFIG_CMSIS_EXECUTORCH_ML=y

# Disable backends that require NPU/CMSIS-NN hardware not on B-L475-IOT01A
CONFIG_CMSIS_EXECUTORCH_BACKEND_ETHOSU=n
CONFIG_CMSIS_EXECUTORCH_BACKEND_CORTEXM=y

# Stack/heap for ML workload
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y

# Use Newlib from the Arm GNU Toolchain
CONFIG_NEWLIB_LIBC=y
CONFIG_PICOLIBC=n
CONFIG_PICOLIBC_USE_MODULE=n
CONFIG_MINIMAL_LIBC=n
